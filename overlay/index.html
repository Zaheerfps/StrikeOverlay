<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strike Overlay</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="overlay">

    <div class="panel float">

        <div class="title">
            🩸 STRIKE OVERLAY
        </div>

        <div class="card">

            <div class="label">
                Player
            </div>

            <div class="value" id="playerName">
                Zaheer
            </div>

        </div>

        <div class="divider"></div>

        <div class="card">

            <div class="label">
                Kills
            </div>

            <div class="value" id="kills">
                0
            </div>

        </div>

        <div class="card">

            <div class="label">
                Wins
            </div>

            <div class="value" id="wins">
                0
            </div>

        </div>

        <div class="card">

            <div class="label">
                K/D
            </div>

            <div class="value" id="kd">
                0.00
            </div>

        </div>

        <div class="card">

            <div class="label">
                Viewers
            </div>

            <div class="value" id="viewers">
                0
            </div>

        </div>

        <div class="progress">
            <span></span>
        </div>

        <div class="footer">
            Blood Strike HUD • Sprint 1
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
